apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: local-storage-operator
  namespace: ${OBJECT_NAMESPACE}
  labels:
    app: local-storage-operator
spec:
  groups:
    - name: local-storage-operator.rules
      rules:
      - alert: LSONoDiskManagerReplicas
        expr:  max_over_time(kube_daemonset_status_desired_number_scheduled{namespace="${OBJECT_NAMESPACE}", daemonset="${DAEMONSET_NAME}"}[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LocalVolume / LocalVolumeSet does not match any node"
          description: |
            Local Storage Operator disk-manager DaemonSet does not have any scheduled replicas.
            This DaemonSet handles LocalVolume and LocalVolumeSet objects and creates
            PersistentVolumes (PVs) for devices described in these objects. As result, Local
            Storage Operator is not able to create the PVs.
            Please check all LocalVolume and LocalVolumeSet objects and make sure that they have
            correct "nodeSelector" and "tolerations" fields, and there are nodes that match the
            nodeSelector and all taints of the matching nodes are tolerated.
            A frequent issue is that nodes that run OpenShift Data Foundation (ODF) are tainted,
            so only ODF runs on these nodes. In that case, LocalVolume / LocalVolumeSet objects
            must tolerate such a taint to provide disks for ODF on the nodes.
    - name: lvset_deletion_alerts
      rules:
      - alert: LvSetDeletionAlert
        expr: lso_lvset_deletion_timestamp > 0 and time() - lso_lvset_deletion_timestamp > 72 * 3600
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "LocalVolumeSet has had a deletion timestamp older than 72 hours"
          description: "LocalVolumeSet {{ $labels.lvSetName }} has been marked for deletion for more than 72 hours."
    - name: lso_no_stable_volume_path
      rules:
      - alert: LSONoStableLocalVolumePath
        expr: min_over_time(lso_device_link_without_stable_path{policy="None"}[5m]) == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: |
            Local Storage operator has observed that pv {{ $labels.persistent_volume }} does not
            have a stable device-path in /dev/disk/by-id/ that it can use and hence it may be using
            device paths which may change on reboot. Such device paths should be used carefully.
          message: "Local volume represented by PersistentVolume {{ $labels.persistent_volume }} does not have any valid stable path"
          description: |
            Local Storage operator has observed that pv {{ $labels.persistent_volume }} does not
            have a stable device-path in /dev/disk/by-id/ that it can use and hence it may be using
            device paths which may change on reboot. Such device paths should be used carefully.
    - name: lso_device_link_mismatch
      rules:
      - alert: LSODeviceLinkMismatch
        expr: min_over_time(lso_device_link_mismatch{policy="None"}[5m]) == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: |
            Local Storage operator has observed that pv {{ $labels.persistent_volume }} does not
            have matching symlink it should be using vs symlink LSO prefers it to use for stability between reboots and OS upgrade.
          message: "Local volume represented by PersistentVolume {{ $labels.persistent_volume }} uses a sub-optimal device symlink"
          description: |
            Local Storage operator has observed that pv {{ $labels.persistent_volume }} is using a symlink
            that is not optimum for stability between reboots and OS upgrades. Consider updating
            LocalVolumeDeviceLink policy to preferredSymlink to allow LSO to manage the symlink.
    - name: lso_lv_missing_device_path
      rules:
      - alert: LSOLocalVolumeMissingDevicePath
        expr: min_over_time(lso_lv_missing_device_path_count[5m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LocalVolume references a device path that does not exist on the node"
          description: |
            Local Storage Operator cannot find {{ $value }} device path(s) listed in a LocalVolume
            for storage class {{ $labels.storageClass }} on node {{ $labels.nodeName }}.
            This typically happens when a /dev/disk/by-id/ symlink is removed during an OS upgrade
            (e.g. RHEL 9 to RHEL 10). The existing PersistentVolumes may still be usable, but LSO
            cannot monitor or update their symlinks until the LocalVolume devicePaths are corrected.
            Update the LocalVolume spec to reference a device path that currently exists on the node.
